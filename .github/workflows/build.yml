name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - os: linux
            arch: mipsle
            suffix: linux_mipsle
            goflags: GOOS=linux GOARCH=mipsle GOMIPS=softfloat
            ldflags: "-s -w -linkmode=external -extldflags='-Wl,-rpath=\\$ORIGIN/lib'"
            tags: "netgo osusergo"
            cgo: true
          - os: linux
            arch: amd64
            suffix: linux_amd64
            goflags: GOOS=linux GOARCH=amd64
            ldflags: "-s -w"
            tags: ""
            cgo: false
          - os: linux
            arch: arm64
            suffix: linux_arm64
            goflags: GOOS=linux GOARCH=arm64
            ldflags: "-s -w"
            tags: ""
            cgo: false
          - os: windows
            arch: amd64
            suffix: windows_amd64
            goflags: GOOS=windows GOARCH=amd64
            ldflags: "-s -w"
            tags: ""
            cgo: false

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Install MIPSle cross-compiler (for mipsle target)
      if: matrix.target.arch == 'mipsle' && matrix.target.cgo == true
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-mipsel-linux-gnu g++-mipsel-linux-gnu libc6-dev-mipsel-cross linux-libc-dev-mipsel-cross libgcc-s1-mipsel-cross libstdc++-10-dev-mipsel-cross
        STUBS_DIR="/usr/mipsel-linux-gnu/include/gnu"
        if [ ! -f "${STUBS_DIR}/stubs-o32_soft.h" ]; then
          echo "Creating missing stubs-o32_soft.h for softfloat ABI"
          sudo touch "${STUBS_DIR}/stubs-o32_soft.h"
          sudo sh -c 'echo "#if !defined _STUBS_O32_SOFT_H" > "${STUBS_DIR}/stubs-o32_soft.h"'
          sudo sh -c 'echo "#define _STUBS_O32_SOFT_H 1" >> "${STUBS_DIR}/stubs-o32_soft.h"'
          sudo sh -c 'echo "" >> "${STUBS_DIR}/stubs-o32_soft.h"'
          sudo sh -c 'echo "#include <gnu/stubs-o32.h>" >> "${STUBS_DIR}/stubs-o32_soft.h"'
          sudo sh -c 'echo "" >> "${STUBS_DIR}/stubs-o32_soft.h"'
          sudo sh -c 'echo "#endif" >> "${STUBS_DIR}/stubs-o32_soft.h"'
        fi

    - name: Download and extract SQLite .so from OpenWRT (for MIPSle)
      if: matrix.target.arch == 'mipsle' && matrix.target.cgo == true
      run: |
        wget -q https://mirrors.tuna.tsinghua.edu.cn/openwrt/releases/23.05.0/packages/mipsel_24kc/packages/libsqlite3-0_3410200-1_mipsel_24kc.ipk
        tar -xzf libsqlite3-*.ipk
        tar -xzf data.tar.gz
        mkdir -p lib
        cp ./usr/lib/libsqlite3.so.* ./lib/
        ln -sf libsqlite3.so.0 ./lib/libsqlite3.so
        ls -la lib/

    - name: Set up CGO environment (for mipsle)
      if: matrix.target.arch == 'mipsle' && matrix.target.cgo == true
      run: |
        echo "CC=mipsel-linux-gnu-gcc" >> $GITHUB_ENV
        echo "CXX=mipsel-linux-gnu-g++" >> $GITHUB_ENV
        echo "CGO_ENABLED=1" >> $GITHUB_ENV
        echo "CGO_LDFLAGS=-L$(pwd)/lib" >> $GITHUB_ENV

    - name: Set up CGO disabled (for non-mipsle)
      if: matrix.target.cgo == false
      run: |
        echo "CGO_ENABLED=0" >> $GITHUB_ENV

    - name: Fix go modules
      run: |
        go clean -modcache
        go mod tidy

    - name: Build for ${{ matrix.target.os }}/${{ matrix.target.arch }}
      run: |
        ${{ matrix.target.goflags }} go build -ldflags="${{ matrix.target.ldflags }}" ${{ matrix.target.tags != '' && format('-tags="{0}"', matrix.target.tags) || '' }} -o gapi_${{ matrix.target.suffix }}.${{ matrix.target.os == 'windows' && 'exe' || '' }}
        ls -la gapi_*

    - name: Package MIPSle with lib directory
      if: matrix.target.arch == 'mipsle' && matrix.target.cgo == true
      run: |
        mkdir -p release
        mv gapi_${{ matrix.target.suffix }} release/
        mv lib release/
        ls -la release/
        tar -czf gapi_${{ matrix.target.suffix }}.tar.gz release/

    - name: Upload artifact (MIPSle with lib)
      if: matrix.target.arch == 'mipsle' && matrix.target.cgo == true
      uses: actions/upload-artifact@v4
      with:
        name: gapi_${{ matrix.target.suffix }}
        path: gapi_${{ matrix.target.suffix }}.tar.gz

    - name: Upload artifact (other platforms)
      if: matrix.target.cgo == false
      uses: actions/upload-artifact@v4
      with:
        name: gapi_${{ matrix.target.suffix }}
        path: gapi_${{ matrix.target.suffix }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la artifacts/

      - name: Create or Update Dev Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="dev-latest"
          echo "使用固定版本tag: $VERSION"

          gh release delete "$VERSION" --yes 2>/dev/null || true

          gh release create "$VERSION" \
            --title "Development Build (Latest)" \
            --notes "Automatic build from commit ${{ github.sha }}%0A%0A**Platforms:**%0A- Linux amd64%0A- Linux arm64%0A- Linux mipsle (极路由2 - CGO + SQLite动态库)%0A- Windows amd64%0A%0A**MIPSle说明:**%0A解压后运行 ./release/gapi_linux_mipsle，程序会自动从同级 lib 目录加载 SQLite" \
            --prerelease \
            artifacts/*