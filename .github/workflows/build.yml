name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - os: linux
            arch: mipsle
            suffix: linux_mipsle
            goflags: GOOS=linux GOARCH=mipsle GOMIPS=softfloat
            ldflags: "-s -w -linkmode=external -extldflags='-Wl,-rpath=$ORIGIN/lib'"
            cgo: true
            cross: true
          - os: linux
            arch: amd64
            suffix: linux_amd64
            goflags: GOOS=linux GOARCH=amd64
            ldflags: "-s -w"
            cgo: true
            cross: false
          - os: linux
            arch: arm64
            suffix: linux_arm64
            goflags: GOOS=linux GOARCH=arm64
            ldflags: "-s -w"
            cgo: true
            cross: true
          - os: windows
            arch: amd64
            suffix: windows_amd64
            goflags: GOOS=windows GOARCH=amd64
            ldflags: "-s -w"
            cgo: true
            cross: false

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Install MIPSle cross-compiler
      if: matrix.target.cross == true && matrix.target.arch == 'mipsle'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-mipsel-linux-gnu g++-mipsel-linux-gnu libc6-dev-mipsel-cross linux-libc-dev-mipsel-cross libgcc-s1-mipsel-cross libstdc++-10-dev-mipsel-cross
        STUBS_DIR="/usr/mipsel-linux-gnu/include/gnu"
        if [ ! -f "${STUBS_DIR}/stubs-o32_soft.h" ]; then
          sudo touch "${STUBS_DIR}/stubs-o32_soft.h"
          sudo sh -c 'echo "#if !defined _STUBS_O32_SOFT_H" > "${STUBS_DIR}/stubs-o32_soft.h"'
          sudo sh -c 'echo "#define _STUBS_O32_SOFT_H 1" >> "${STUBS_DIR}/stubs-o32_soft.h"'
          sudo sh -c 'echo "" >> "${STUBS_DIR}/stubs-o32_soft.h"'
          sudo sh -c 'echo "#include <gnu/stubs-o32.h>" >> "${STUBS_DIR}/stubs-o32_soft.h"'
          sudo sh -c 'echo "" >> "${STUBS_DIR}/stubs-o32_soft.h"'
          sudo sh -c 'echo "#endif" >> "${STUBS_DIR}/stubs-o32_soft.h"'
        fi

    - name: Install ARM64 cross-compiler
      if: matrix.target.cross == true && matrix.target.arch == 'arm64'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6-dev-arm64-cross linux-libc-dev-arm64-cross

    - name: Download OpenWRT SQLite for MIPSle
      if: matrix.target.arch == 'mipsle'
      run: |
        wget -q https://mirrors.tuna.tsinghua.edu.cn/openwrt/releases/23.05.0/packages/mipsel_24kc/packages/libsqlite3-0_3410200-1_mipsel_24kc.ipk
        tar -xzf libsqlite3-*.ipk
        tar -xzf data.tar.gz
        mkdir -p lib
        cp ./usr/lib/libsqlite3.so.* ./lib/
        ln -sf libsqlite3.so.0 ./lib/libsqlite3.so
        ls -la lib/

    - name: Download ARM64 SQLite
      if: matrix.target.arch == 'arm64'
      run: |
        sudo dpkg --add-architecture arm64
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev:arm64
        mkdir -p lib
        cp /usr/aarch64-linux-gnu/lib/libsqlite3.so.* ./lib/
        ln -sf libsqlite3.so.0 ./lib/libsqlite3.so
        ls -la lib/

    - name: Install SQLite for Linux amd64
      if: matrix.target.os == 'linux' && matrix.target.arch == 'amd64'
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev
        mkdir -p lib
        cp /usr/lib/x86_64-linux-gnu/libsqlite3.so.* ./lib/
        ln -sf libsqlite3.so.0 ./lib/libsqlite3.so
        ls -la lib/

    - name: Install MinGW-w64 and SQLite for Windows
      if: matrix.target.os == 'windows'
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64 libsqlite3-dev
        mkdir -p lib
        cp /usr/lib/x86_64-linux-gnu/libsqlite3.so.* ./lib/
        ls -la lib/

    - name: Set MIPSle CGO environment
      if: matrix.target.arch == 'mipsle'
      run: |
        echo "CC=mipsel-linux-gnu-gcc" >> $GITHUB_ENV
        echo "CXX=mipsel-linux-gnu-g++" >> $GITHUB_ENV
        echo "CGO_ENABLED=1" >> $GITHUB_ENV
        echo "CGO_LDFLAGS=-L$(pwd)/lib" >> $GITHUB_ENV

    - name: Set ARM64 CGO environment
      if: matrix.target.arch == 'arm64'
      run: |
        echo "CC=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
        echo "CXX=aarch64-linux-gnu-g++" >> $GITHUB_ENV
        echo "CGO_ENABLED=1" >> $GITHUB_ENV
        echo "CGO_LDFLAGS=-L$(pwd)/lib" >> $GITHUB_ENV

    - name: Set Linux amd64 CGO environment
      if: matrix.target.os == 'linux' && matrix.target.arch == 'amd64'
      run: |
        echo "CGO_ENABLED=1" >> $GITHUB_ENV
        echo "CGO_LDFLAGS=-L$(pwd)/lib" >> $GITHUB_ENV

    - name: Set Windows CGO environment
      if: matrix.target.os == 'windows'
      run: |
        echo "CC=x86_64-w64-mingw32-gcc" >> $GITHUB_ENV
        echo "CXX=x86_64-w64-mingw32-g++" >> $GITHUB_ENV
        echo "CGO_ENABLED=1" >> $GITHUB_ENV

    - name: Download dependencies
      run: |
        go clean -modcache
        go mod tidy

    - name: Build for ${{ matrix.target.os }}/${{ matrix.target.arch }}
      run: |
        OUTPUT_FILE="gapi_${{ matrix.target.suffix }}${{ matrix.target.os == 'windows' && '.exe' || '' }}"
        ${{ matrix.target.goflags }} go build -ldflags="${{ matrix.target.ldflags }}" -o "$OUTPUT_FILE"
        ls -la gapi_*

    - name: Package with lib directory
      run: |
        mkdir -p release
        if [ "${{ matrix.target.os }}" = "windows" ]; then
          mv gapi_${{ matrix.target.suffix }}.exe release/
        else
          mv gapi_${{ matrix.target.suffix }} release/
        fi
        if [ -d "lib" ]; then
          mv lib release/
        fi
        ls -la release/
        tar -czf gapi_${{ matrix.target.suffix }}.tar.gz release/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: gapi_${{ matrix.target.suffix }}
        path: gapi_${{ matrix.target.suffix }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la artifacts/

      - name: Create or Update Dev Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="dev-latest"
          echo "使用固定版本tag: $VERSION"

          gh release delete "$VERSION" --yes 2>/dev/null || true

          gh release create "$VERSION" \
            --title "Development Build (Latest)" \
            --notes "Automatic build from commit ${{ github.sha }}%0A%0A**Platforms (全部使用 CGO + SQLite):**%0A- Linux amd64%0A- Linux arm64%0A- Linux mipsle (极路由 MT7620A/MT7628)%0A- Windows amd64%0A%0A**使用说明:**%0A解压release目录后运行对应平台的可执行文件，MIPSle版本会自动从lib目录加载SQLite" \
            --prerelease \
            artifacts/*